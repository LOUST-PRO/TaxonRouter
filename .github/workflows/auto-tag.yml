name: Auto-Tag

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:

jobs:
  classify:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install taxonrouter-mcp
        run: go install ./cmd/taxonrouter-mcp

      - name: Classify PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PROJECT_ID: ${{ secrets.GITHUB_PROJECT_ID }}
        run: |
          # Build a classification request from the PR
          PR_NUMBER=$(jq -r '.number' "$GITHUB_EVENT_PATH")
          echo "Classifying PR #$PR_NUMBER"

  webhook-receiver:
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    steps:
      - name: Receive webhook
        run: echo "Webhook received — daemon runs on self-hosted runner"
