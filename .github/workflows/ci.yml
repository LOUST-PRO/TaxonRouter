name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: go test ./... -race -v -count=1

      - name: Build
        run: go build -o /tmp/taxonrouter-mcp ./cmd/taxonrouter-mcp && go build -o /tmp/taxonrouter-auto-tagger ./cmd/taxonrouter-auto-tagger

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Tidy
        run: go mod tidy && git diff --exit-code
